name: Build Drawer

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/**"
      - "fonts/**"
      - "*.ico"
      - "*.txt"
      - "*.iss"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYINSTALLER_EXCLUDES: >-
    --exclude-module PyQt6.QtNetwork
    --exclude-module PyQt6.QtQml
    --exclude-module PyQt6.QtQuick
    --exclude-module PyQt6.QtWebEngine
    --exclude-module PyQt6.QtMultimedia
    --exclude-module PyQt6.QtSvg
    --exclude-module PyQt6.QtOpenGL
    --exclude-module PyQt6.QtDBus
    --exclude-module PyQt6.QtSql
    --exclude-module PyQt6.QtPdf
    --exclude-module PyQt6.QtBluetooth
    --exclude-module PyQt6.QtSerialPort
    --exclude-module PyQt6.QtDesigner
    --exclude-module PyQt6.QtHelp
    --exclude-module PyQt6.QtTest
    --exclude-module PIL
    --exclude-module unittest
    --exclude-module test
    --exclude-module sqlite3

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Drawer-Windows
          - os: macos-latest
            artifact: Drawer-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Install UPX and Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install upx innosetup -y

      - name: Build portable exe (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          DRAWER_BUILD_MODE: onefile
        run: pyinstaller --noconfirm --distpath dist/portable Drawer.spec

      - name: Build app directory (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          DRAWER_BUILD_MODE: onedir
        run: pyinstaller --noconfirm --distpath dist/onedir Drawer.spec

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev"
          fi
          iscc "//DAppVersion=$VERSION" installer.iss

      - name: Generate macOS icns
        if: runner.os == 'macOS'
        run: |
          python -m pip install Pillow
          python <<'PY'
          import os
          from PIL import Image
          src = Image.open("drawer.ico")
          best = None
          for i in range(getattr(src, "n_frames", 1)):
              src.seek(i)
              if best is None or src.size[0] > best.size[0]:
                  best = src.copy()
          best = best.convert("RGBA")
          os.makedirs("Drawer.iconset", exist_ok=True)
          for sz, name in [
              (16,  "16x16"),    (32,  "16x16@2x"),
              (32,  "32x32"),    (64,  "32x32@2x"),
              (128, "128x128"),  (256, "128x128@2x"),
              (256, "256x256"),  (512, "256x256@2x"),
              (512, "512x512"),  (1024,"512x512@2x"),
          ]:
              best.resize((sz, sz), Image.LANCZOS).save(f"Drawer.iconset/icon_{name}.png")
          PY
          iconutil -c icns Drawer.iconset -o drawer.icns

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --name Drawer --strip \
            --icon drawer.icns \
            --osx-bundle-identifier com.drawer.app \
            --add-data "info_main.txt:." \
            --add-data "info_viewer.txt:." \
            --add-data "drawer.ico:." \
            --add-data "fonts:fonts" \
            --add-data "Cat:Cat" \
            $PYINSTALLER_EXCLUDES \
            main.py
          xattr -cr dist/Drawer.app
          hdiutil create -volname Drawer \
            -srcfolder dist/Drawer.app \
            -ov -format UDZO dist/Drawer.dmg

      - name: Upload portable exe
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Drawer-Windows-Portable
          path: dist/portable/Drawer.exe

      - name: Upload installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Drawer-Windows-Setup
          path: dist/Drawer_Setup.exe

      - name: Upload macOS dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Drawer-macOS
          path: dist/Drawer.dmg

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Drawer-Windows-Portable
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: Drawer-Windows-Setup
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: Drawer-macOS
          path: artifacts

      - name: Rename with version
        run: |
          V=${GITHUB_REF_NAME#v}
          mv artifacts/Drawer.exe "artifacts/Drawer-${V}.exe"
          mv artifacts/Drawer_Setup.exe "artifacts/Drawer-${V}-setup.exe"
          mv artifacts/Drawer.dmg "artifacts/Drawer-${V}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Drawer-*
          generate_release_notes: true
