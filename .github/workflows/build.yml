name: Build Drawer

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/**"
      - "fonts/**"
      - "*.ico"
      - "*.txt"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYINSTALLER_EXCLUDES: >-
    --exclude-module PyQt6.QtNetwork
    --exclude-module PyQt6.QtQml
    --exclude-module PyQt6.QtQuick
    --exclude-module PyQt6.QtWebEngine
    --exclude-module PyQt6.QtMultimedia
    --exclude-module PyQt6.QtSvg
    --exclude-module PyQt6.QtOpenGL
    --exclude-module PyQt6.QtDBus
    --exclude-module PyQt6.QtSql
    --exclude-module PyQt6.QtPdf
    --exclude-module PyQt6.QtBluetooth
    --exclude-module PyQt6.QtSerialPort
    --exclude-module PyQt6.QtDesigner
    --exclude-module PyQt6.QtHelp
    --exclude-module PyQt6.QtTest
    --exclude-module PIL
    --exclude-module unittest
    --exclude-module test
    --exclude-module sqlite3

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Drawer-Windows
          - os: macos-latest
            artifact: Drawer-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name Drawer --icon drawer.ico --strip \
            --add-data "info_main.txt;." \
            --add-data "info_viewer.txt;." \
            --add-data "drawer.ico;." \
            --add-data "fonts;fonts" \
            $PYINSTALLER_EXCLUDES \
            main.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --name Drawer --strip \
            --add-data "info_main.txt:." \
            --add-data "info_viewer.txt:." \
            --add-data "drawer.ico:." \
            --add-data "fonts:fonts" \
            $PYINSTALLER_EXCLUDES \
            main.py
          hdiutil create -volname Drawer \
            -srcfolder dist/Drawer.app \
            -ov -format UDZO dist/Drawer.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Drawer.exe

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Drawer.dmg

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Drawer-Windows
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: Drawer-macOS
          path: artifacts

      - name: Rename with version
        run: |
          V=${GITHUB_REF_NAME#v}
          mv artifacts/Drawer.exe "artifacts/Drawer_${V}_Windows.exe"
          mv artifacts/Drawer.dmg "artifacts/Drawer_${V}_macOS.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Drawer_*
          generate_release_notes: true
